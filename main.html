<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      background-color: black;
      color: white;
      margin: 0;
      font-family: monospace;
    }

    .console-container {
      margin: auto;
      font-family: monospace;
      height: 40vh;
      margin-bottom: 10vh;
      padding-top: 40px;
      text-align: center;
    }

    .console {
      width: 100%;
      box-sizing: border-box;
      margin: auto;
      overflow: hidden;
    }

    .consolebody {
      box-sizing: border-box;
      padding: 20px;
      background-image: linear-gradient(90deg, rgba(0,255,48,1) 0%, rgba(0,242,255,1) 100%);
      color: black;
      border-radius: 15px;
      max-width: 600px;
      margin: auto;
    }

    input {
      width: 90%;
      padding: 10px;
      border: none;
      outline: none;
      font-family: monospace;
    }

    .button-wrapper {
      padding-top: 20px;
      text-align: center;
    }

    button {
      font-family: monospace;
      font-weight: bold;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      margin: 5px;
      border-radius: 8px;
    }

    .console-button {
      background: white;
      color: black;
    }
  </style>

  <title>App</title>
</head>

<body>

  <div class="console-container">

    <h1>URL Launcher</h1>

    <div class="consolebody">
      <p>Enter a URL:</p>
      <input id="url-target" type="text" placeholder="example.com or https://example.com" />
    </div>

    <div class="button-wrapper">
      <button id="create" class="console-button">Generate</button>
      <button onclick="document.getElementById('url-target').value=''">Clear</button>
    </div>

  </div>

  <script>
    const url = document.getElementById("url-target");

    document.getElementById("create").onclick = function () {
      let input = url.value.trim();

      // FIX: auto add https:// if missing
      if (!input.startsWith("http://") && !input.startsWith("https://")) {
        input = "https://" + input;
      }

      const win = window.open();
      win.document.body.style.margin = "0";
      win.document.body.style.height = "100vh";

      const iframe = win.document.createElement("iframe");
      iframe.style.border = "none";
      iframe.style.width = "100%";
      iframe.style.height = "100%";
      iframe.src = input;

      win.document.body.appendChild(iframe);
    };
  </script>

</body>

</html>
