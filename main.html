<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      background-color: black;
      color: white;
    }

    @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap");

    .credit {
      font-family: monospace;
      text-align: center;
    }

    a {
      color: #4287f5;
    }

    input {
      background: rgba(0, 0, 0, 0);
      border: none;
      outline: none;
      width: 100%;
      border-bottom: 1px solid black;
      color: black;
      font-family: monospace;
      font-size: inherit;
    }

    ::placeholder {
      font-style: italic;
      color: white;
      opacity: 1;
    }

    .console-container {
      margin: auto;
      font-family: monospace;
      height: 40vh;
      margin-bottom: 10vh;
    }

    .console {
      width: 100%;
      box-sizing: border-box;
      margin: auto;
      overflow: hidden;
      font-family: monospace;
    }

    .console-input {
      padding-bottom: 15%;
      font-family: monospace;
    }

    .console h1 {
      font-family: monospace;
      text-align: center;
      color: #fff;
    }

    .console .consolebody {
      box-sizing: border-box;
      font-family: monospace;
      padding: 20px;
      background-image: linear-gradient(90deg, rgba(0,255,48,1) 0%, rgba(0,242,255,1) 100%);
      color: black;
      border-radius: 15px;
    }

    .button-wrapper {
      padding-top: 2%;
      text-align: center;
      font-family: monospace;
    }

    .console-button {
      font-family: monospace;
      font-weight: bold;
      text-transform: uppercase;
      padding: 0.6em 2em;
      margin-right: 2em;
      border: none;
      outline: none;
      color: rgb(0, 0, 0);
      background: white;
      cursor: pointer;
      position: relative;
      border-radius: 10px;
      font-size: 20px;
    }

    .console-button:before {
      content: "";
      background: linear-gradient(45deg, #fff700, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
      position: absolute;
      top: -2px;
      left: -2px;
      background-size: 400%;
      z-index: -1;
      filter: blur(5px);
      width: calc(100% + 4px);
      height: calc(100% + 4px);
      animation: glowingbn5 20s linear infinite;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
      border-radius: 10px;
    }

    @keyframes glowingbn5 {
      0% { background-position: 0 0; }
      50% { background-position: 400% 0; }
      100% { background-position: 0 0; }
    }

    .console-button:hover:before {
      opacity: 1;
    }

    .console-button:after {
      z-index: -1;
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      left: 0;
      top: 0;
      border-radius: 10px;
    }
  </style>

  <link href="./images/logo.png" rel="icon" />
  <title>PurePro4561 | about:blank</title>
</head>

<body>
  <div class="console-container">
    <div class="console">
      <h1>about:blank</h1>
      <div class="consolebody">
        <p>Enter a URL you want to be opened in an about:blank page below:</p>

        <p class="console-input">
          <input id="url-target" value="" autocomplete="on" type="text" autofocus />
        </p>

        <p>Enter any URL you want to open.</p>
      </div>
    </div>

    <div class="button-wrapper">
      <button id="create" class="console-button">Create page</button>
      <button class="console-button" onclick="document.getElementById('url-target').value = ''">
        Clear input
      </button>
    </div>

    <button
      onclick="alert('Hello there! This opens a page inside about:blank using an iframe.')">
      What is this?
    </button>
  </div>

  <script>
    var url = document.getElementById("url-target");

    document.getElementById("create").onclick = function () {
      win = window.open();
      win.document.body.style.margin = "0";
      win.document.body.style.height = "100vh";

      var iframe = win.document.createElement("iframe");
      iframe.style.border = "none";
      iframe.style.width = "100%";
      iframe.style.height = "100%";
      iframe.style.margin = "0";
      iframe.referrerpolicy = "no-referrer";
      iframe.allow = "fullscreen";
      iframe.src = url.value;

      win.document.body.appendChild(iframe);
    };
  </script>

</body>
</html>
